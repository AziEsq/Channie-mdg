<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Network of Healing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #061629;
    overflow: hidden;
    font-family: Georgia, serif;
  }
  #stage { width: 100vw; height: 100vh; display: block; }

  /* Heartbeat: lub-dub at ~70 BPM */
  @keyframes heartbeat {
    0%   { r: 5;  opacity: 0; }
    8%   { r: 6;  opacity: 0.9; }
    22%  { r: 26; opacity: 0; }
    30%  { r: 6;  opacity: 0.85; }
    48%  { r: 36; opacity: 0; }
    100% { r: 5;  opacity: 0; }
  }
  .pulse-ring {
    animation: heartbeat 1.4s ease-out infinite;
    animation-play-state: paused;
  }
  .pulse-ring.beating { animation-play-state: running; }

  /* Light-up reveal */
  .facility-group {
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center;
    transform: scale(0.5);
    transition: opacity 0.7s ease-out, transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .facility-group.lit {
    opacity: 1;
    transform: scale(1);
  }

  .connection {
    opacity: 0;
    transition: opacity 1.6s ease-in-out;
  }
  .connection.shown { opacity: 1; }

  .basemap-fade {
    opacity: 0;
    transition: opacity 1.4s ease-out;
  }
  .basemap-fade.shown { opacity: 1; }

  /* Title fade-in at end */
  .title-text {
    opacity: 0;
    transition: opacity 2s ease-in 1s;
  }
  .title-text.shown { opacity: 1; }

  /* Start prompt */
  #prompt {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    color: #d4b885;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 16px;
    letter-spacing: 0.05em;
    opacity: 0.5;
    pointer-events: none;
    transition: opacity 0.5s;
    z-index: 10;
  }
  #prompt.hidden { opacity: 0; }

  /* Tooltip on hover */
  #tooltip {
    position: fixed;
    background: rgba(6, 22, 41, 0.95);
    color: #d4b885;
    font-family: Georgia, serif;
    font-size: 14px;
    padding: 8px 12px;
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease-out;
    z-index: 20;
    white-space: nowrap;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #tooltip.visible { opacity: 1; }

  /* Zoom enabled hint */
  body.zoom-enabled #stage {
    cursor: grab;
  }
  body.zoom-enabled #stage.panning {
    cursor: grabbing;
  }

  /* Eden Logo */
  #logo {
    position: fixed;
    top: 20px;
    right: 20px;
    height: 80px;
    width: auto;
    opacity: 0.85;
    transition: opacity 0.3s ease;
    z-index: 15;
    pointer-events: none;
  }
  #logo:hover {
    opacity: 1;
  }

  /* Date display during animation */
  #date-display {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 28px;
    color: #d4b885;
    opacity: 0;
    text-align: center;
    margin-bottom: 8px;
    transition: opacity 0.3s ease-in-out;
  }
  #date-display.shown {
    opacity: 0.85;
  }
</style>
</head>
<body>
<svg id="stage" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet" role="img"
     aria-label="A Network of Healing — fifty Eden Senior Care facilities glowing on a map of the upper Midwest and mid-Atlantic">
  <rect width="1920" height="1080" fill="#061629"/>
  <g id="map-container">
    <g id="ambient"></g>
    <g id="states" class="basemap-fade"></g>
    <g id="connections"></g>
    <g id="facilities"></g>
  </g>
  <g class="title-text">
    <text x="80" y="1010" font-family="Georgia, serif" font-style="italic"
          font-size="34" fill="#d4b885" opacity="0.75">A Network of Healing</text>
    <text x="80" y="1042" font-family="sans-serif" font-size="14"
          fill="#3d6298" opacity="0.6" letter-spacing="3">FIFTY PLACES OF CARE · SIX STATES</text>
  </g>
</svg>
<img id="logo" src="Eden Logo.png" alt="Eden Senior Care">
<div id="prompt">
  <div id="date-display"></div>
  <div>press space to begin</div>
</div>
<div id="tooltip"></div>
<audio id="background-music" src="01 - Main Title.mp3" loop></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const FACILITIES = [

,

  {"name":"Edenbrook Wisconsin Rapids","lat":44.408768,"lng":-89.802908,"state":"WI","opened":"2017-11-01"}
,
  {"name":"Evansville Manor","lat":42.782821,"lng":-89.312929,"state":"WI","opened":"2018-08-01"}
,
  {"name":"Fair Oaks Lodge","lat":46.438203,"lng":-95.115798,"state":"MN","opened":"2018-03-01"}

  {"name":"Friendly Village","lat":45.629348,"lng":-89.427179,"state":"WI","opened":"2017-09-01"}
,
  {"name":"Lakeshore Manor","lat":44.011794,"lng":-88.528139,"state":"WI","opened":"2021-05-01"}
,
  {"name":"Maple Ridge","lat":41.6231,"lng":-81.438209,"state":"OH","opened":"2022-06-01"}
,
  {"name":"Mission Creek","lat":43.017855,"lng":-88.287105,"state":"WI","opened":"2021-05-01"}
,
  {"name":"Natures Point","lat":45.548926,"lng":-94.128136,"state":"MN","opened":"2013-12-01"}
,
  {"name":"Omro Care Center","lat":44.035094,"lng":-88.75136,"state":"WI","opened":"2018-12-01"}
,
  {"name":"Sugar Grove Senior Living","lat":39.689737,"lng":-86.421544,"state":"IN","opened":"2026-05-01"}
,
  {"name":"The Heights at Evansville Manor","lat":42.78319,"lng":-89.311939,"state":"WI","opened":"2018-08-01"}
,
  {"name":"Whispering Pines","lat":43.857062,"lng":-88.837643,"state":"WI","opened":"2018-08-01"}
,
  {"name":"Willow Falls Senior Living","lat":41.553682,"lng":-88.120278,"state":"IL","opened":"2024-04-01"}
,
  {"name":"Wolverton Glen","lat":43.857062,"lng":-88.837643,"state":"WI","opened":"2018-08-01"}
,
  {"name":"Woods of Caledonia","lat":42.79547,"lng":-87.785484,"state":"WI","opened":"2020-11-01"}
];

const STATE_ORDER = ['MN', 'WI', 'PA', 'IL', 'IN', 'OH'];
const TARGET_NAMES = new Set(["Illinois","Indiana","Minnesota","Ohio","Pennsylvania","Wisconsin"]);

const W = 1920, H = 1080;
const C = {
  bg: '#061629', stateFill: '#0d2842', stateStroke: '#2a5689',
  ambient: '#3d6298', conn: 'rgba(196, 161, 107, 0.42)',
  goldAura: '#c19a5e', goldMid: '#d4b885', goldCore: '#f0dab0', pulse: '#d4b885'
};

const svg = d3.select('#stage');

// Ambient particles (stars)
const ambientData = d3.range(120).map(() => ({
  x: Math.random() * W, y: Math.random() * H,
  r: 0.6 + Math.random() * 1.4, o: 0.08 + Math.random() * 0.22
}));
svg.select('#ambient').selectAll('circle').data(ambientData).join('circle')
  .attr('cx', d => d.x).attr('cy', d => d.y).attr('r', d => d.r)
  .attr('fill', C.ambient).attr('opacity', d => d.o);

let projected = [];
let edgeList = [];

d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {
  const all = topojson.feature(us, us.objects.states).features;
  const targets = all.filter(f => TARGET_NAMES.has(f.properties.name));
  const fc = {type: 'FeatureCollection', features: targets};
  const projection = d3.geoAlbers().fitExtent([[80, 80], [W - 80, H - 140]], fc);
  const path = d3.geoPath(projection);

  svg.select('#states').selectAll('path').data(targets).join('path')
    .attr('d', path).attr('fill', C.stateFill).attr('stroke', C.stateStroke)
    .attr('stroke-width', 1.4).attr('opacity', 0.95);

  projected = FACILITIES.map(f => ({...f, p: projection([f.lng, f.lat])}));

  // Spread co-located facilities in a small ring
  const groups = {};
  projected.forEach(f => {
    const k = Math.round(f.p[0] * 10) + ',' + Math.round(f.p[1] * 10);
    (groups[k] = groups[k] || []).push(f);
  });
  Object.values(groups).forEach(g => {
    if (g.length > 1) {
      const r = 14;
      g.forEach((f, i) => {
        const a = (2 * Math.PI * i) / g.length - Math.PI / 2;
        f.p = [f.p[0] + Math.cos(a) * r, f.p[1] + Math.sin(a) * r];
      });
    }
  });

  // k=2 nearest neighbor edges + Indiana-Ohio bridges
  const edges = new Set();
  projected.forEach((f, i) => {
    const dists = projected.map((g, j) => ({
      j, d: i === j ? Infinity : Math.hypot(f.p[0] - g.p[0], f.p[1] - g.p[1])
    }));
    dists.sort((a, b) => a.d - b.d);
    for (let k = 0; k < 2; k++) {
      const j = dists[k].j;
      edges.add(i < j ? `${i}-${j}` : `${j}-${i}`);
    }
  });
  const bridges = [
    ['Sugar Grove Senior Living', 'Eden Vista Stow'],
    ['Sugar Grove Senior Living', 'Maple Ridge'],
    ['Edenbrook Rochester', 'Edenbrook Platteville'],
    ['Edenbrook Rochester', 'Edenbrook Wisconsin Rapids'],
    ['Eden Vista Barrington', 'Woods of Caledonia'],
    ['Eden Vista Barrington', 'Eden Vista Greendale'],
    ['Charleston House MC', 'Mission Creek'],
    ['The Heights at Evansville Manor', 'Eden Vista Hoffman Estates']
  ];
  bridges.forEach(([a, b]) => {
    const i = projected.findIndex(p => p.name === a);
    const j = projected.findIndex(p => p.name === b);
    if (i >= 0 && j >= 0) edges.add(i < j ? `${i}-${j}` : `${j}-${i}`);
  });
  edgeList = [...edges].map(s => s.split('-').map(Number)).map(([i, j]) => ({a: projected[i], b: projected[j]}));

  // Render connections (hidden initially)
  svg.select('#connections').selectAll('line').data(edgeList).join('line')
    .attr('class', 'connection')
    .attr('x1', d => d.a.p[0]).attr('y1', d => d.a.p[1])
    .attr('x2', d => d.b.p[0]).attr('y2', d => d.b.p[1])
    .attr('stroke', C.conn).attr('stroke-width', 2.5).attr('stroke-linecap', 'round');

  // Render facility groups with TWO nested g's:
  //   outer = positioning (d3-set translate), CSS doesn't touch
  //   inner = CSS animations (scale/opacity for light-up + heartbeat)
  const positioned = svg.select('#facilities').selectAll('g.position').data(projected).join('g')
    .attr('class', 'position')
    .attr('transform', d => `translate(${d.p[0]}, ${d.p[1]})`);

  const fg = positioned.append('g')
    .attr('class', 'facility-group')
    .attr('data-name', d => d.name);

  fg.append('circle').attr('r', 28).attr('data-base-r', 28).attr('fill', C.goldAura).attr('opacity', 0.10);
  fg.append('circle').attr('r', 14).attr('data-base-r', 14).attr('fill', C.goldMid).attr('opacity', 0.40);
  fg.append('circle').attr('class', 'pulse-ring').attr('data-base-r', 6).attr('fill', 'none')
    .attr('stroke', C.pulse).attr('stroke-width', 1.8).attr('r', 6);
  fg.append('circle').attr('r', 4.5).attr('data-base-r', 4.5).attr('fill', C.goldCore);

  // Add hover tooltips to facility groups
  const tooltip = document.getElementById('tooltip');
  document.querySelectorAll('.facility-group').forEach(el => {
    el.addEventListener('mouseenter', (e) => {
      tooltip.textContent = el.getAttribute('data-name');
      tooltip.classList.add('visible');
    });
    el.addEventListener('mousemove', (e) => {
      const x = e.clientX + 10;
      const y = e.clientY + 10;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    });
    el.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });
  });

  // Begin: fade in basemap immediately so empty navy isn't held too long
  setTimeout(() => svg.select('#states').classed('shown', true), 200);
});

// Animation control
let isPlaying = false;
const prompt = document.getElementById('prompt');

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function reset() {
  document.querySelectorAll('.facility-group').forEach(el => el.classList.remove('lit'));
  document.querySelectorAll('.connection').forEach(el => el.classList.remove('shown'));
  document.querySelectorAll('.pulse-ring').forEach(el => el.classList.remove('beating'));
  document.querySelector('.title-text').classList.remove('shown');
  document.getElementById('date-display').classList.remove('shown');
  // Reset audio
  const audio = document.getElementById('background-music');
  if (audio) {
    audio.pause();
    audio.currentTime = 0;
  }
  // Reset zoom
  zoomEnabled = false;
  document.body.classList.remove('zoom-enabled');
  d3.select('#map-container').transition().duration(400).attr('transform', 'translate(0,0) scale(1)');
}

function play() {
  if (isPlaying) return;
  isPlaying = true;
  prompt.classList.add('hidden');
  reset();

  // Start background music
  const audio = document.getElementById('background-music');
  if (audio && audio.src) {
    audio.play().catch(err => console.log('Audio play failed:', err));
  }

  const dotDelay = 300;    // ms between dots
  let t = 250;             // initial delay so the basemap is visible first

  // Sort facilities by opening date (chronological order)
  const sorted = [...projected].sort((a, b) => {
    // Facilities with opening dates come first, sorted chronologically
    if (a.opened && b.opened) {
      return new Date(a.opened) - new Date(b.opened);
    }
    // Facilities without dates go to the end
    if (a.opened) return -1;
    if (b.opened) return 1;
    return 0;
  });

  // Light up facilities in chronological order
  sorted.forEach(f => {
    setTimeout(() => {
      const el = document.querySelector(`.facility-group[data-name="${CSS.escape(f.name)}"]`);
      if (el) el.classList.add('lit');

      // Update date display
      const dateDisplay = document.getElementById('date-display');
      if (dateDisplay && f.opened) {
        const date = new Date(f.opened);
        dateDisplay.textContent = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        dateDisplay.classList.add('shown');
      }
    }, t);
    t += dotDelay;
  });

  // After all dots: fade in connections, start heartbeat, show title
  setTimeout(() => {
    document.querySelectorAll('.connection').forEach(el => el.classList.add('shown'));
  }, t);
  setTimeout(() => {
    document.querySelectorAll('.pulse-ring').forEach(el => el.classList.add('beating'));
  }, t + 1400);
  setTimeout(() => {
    document.querySelector('.title-text').classList.add('shown');
  }, t + 1800);
  setTimeout(() => {
    isPlaying = false;
    prompt.textContent = 'press space to replay';
    prompt.classList.remove('hidden');
  }, t + 4200);
  // Enable zoom after animation and update prompt
  setTimeout(() => {
    zoomEnabled = true;
    document.body.classList.add('zoom-enabled');
    prompt.textContent = 'scroll to zoom · drag to pan · hover for names · press space to replay';
  }, t + 4200);
}

// D3 Zoom behavior
let zoomEnabled = false;
const zoomBehavior = d3.zoom()
  .scaleExtent([0.5, 4])
  .on('start', function(event) {
    if (!zoomEnabled) event.sourceEvent.preventDefault();
  })
  .on('zoom', (event) => {
    if (zoomEnabled) {
      // Apply zoom to the container group (all map elements zoom together)
      d3.select('#map-container').attr('transform', event.transform);

      // Scale circle radii inversely with zoom (shrink dots as you zoom in)
      const scale = event.transform.k;
      d3.selectAll('#facilities circle[data-base-r]').attr('r', function() {
        const baseR = parseFloat(d3.select(this).attr('data-base-r'));
        return Math.max(baseR / scale, 0.5); // minimum 0.5px to stay visible
      });

      // Also scale stroke width for pulse rings
      d3.selectAll('#facilities .pulse-ring').attr('stroke-width', function() {
        return Math.max(1.8 / scale, 0.3);
      });
    }
  });

d3.select('#stage').call(zoomBehavior);

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.key === 'r' || e.key === 'R') {
    e.preventDefault();
    play();
  }
});
document.addEventListener('click', () => play());

// Frozen mode for static export: ?frozen=1 shows everything fully lit, no motion
if (new URLSearchParams(location.search).has('frozen')) {
  prompt.style.display = 'none';
  const showAll = () => {
    document.querySelectorAll('.facility-group').forEach(el => el.classList.add('lit'));
    document.querySelectorAll('.connection').forEach(el => el.classList.add('shown'));
    document.querySelector('.title-text').classList.add('shown');
    document.querySelectorAll('#states.basemap-fade').forEach(el => el.classList.add('shown'));
    // Hide pulse rings entirely in frozen mode (they only add motion)
    document.querySelectorAll('.pulse-ring').forEach(el => el.style.display = 'none');
  };
  // Wait for the d3.json fetch to populate everything
  const tryShow = () => {
    if (document.querySelectorAll('.facility-group').length >= 50) showAll();
    else setTimeout(tryShow, 100);
  };
  tryShow();
}
</script>
</body>
</html>
